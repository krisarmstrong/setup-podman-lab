# Ruff configuration - Python 3.14 standards
# https://docs.astral.sh/ruff/

target-version = "py314"
line-length = 100
indent-width = 4

[lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "S", "RUF"]
ignore = [
    "S101",    # assert is expected in tests and lightweight CLIs
    "COM812",  # trailing-comma-missing (conflicts with formatter)
    "ISC001",  # single-line-implicit-string-concatenation (conflicts with formatter)
]

fixable = ["ALL"]
unfixable = []

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"tests/**/*" = ["S101", "S105", "S106", "S314", "S603", "S607"]
"test_*.py" = ["S101", "S105", "S106", "S314", "S603", "S607"]

[lint.isort]
known-first-party = []

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

[lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "double"
