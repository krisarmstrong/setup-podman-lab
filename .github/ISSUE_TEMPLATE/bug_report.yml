name: Defect
description: Report a reproducible defect or regression in Setup Podman Lab
title: "Defect: "
labels: ["type: defect", "status: needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what impact does it have?
      placeholder: Describe the defect in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide the shortest reliable path to reproduce the defect.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area: api
        - area: build
        - area: ci
        - area: cli
        - area: config
        - area: data
        - area: docs
        - area: frontend
        - area: infra
        - area: packaging
        - area: security
        - area: tests
        - area: tooling
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - severity: critical
        - severity: high
        - severity: medium
        - severity: low
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or Commit
      placeholder: v1.2.3, commit SHA, deployed URL, or "main"
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, browser, device, deployment target, or runtime version
  - type: textarea
    id: logs
    attributes:
      label: Logs or Output
      description: Paste only relevant output. Redact secrets.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional Context
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I included enough detail for someone else to reproduce or investigate.
          required: true
