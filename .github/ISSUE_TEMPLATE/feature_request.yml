name: Feature
description: Propose a new capability or meaningful improvement for Setup Podman Lab
title: "Feature: "
labels: ["type: feature", "status: needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
      placeholder: Describe the problem without assuming a specific implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired Outcome
      description: What should be true when this is done?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area: api
        - area: build
        - area: ci
        - area: cli
        - area: config
        - area: data
        - area: docs
        - area: frontend
        - area: infra
        - area: packaging
        - area: security
        - area: tests
        - area: tooling
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority: critical
        - priority: high
        - priority: medium
        - priority: low
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Use checkboxes for observable behavior.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: context
    attributes:
      label: Additional Context
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I described the user or maintainer problem, not only a proposed implementation.
          required: true
