name: Title Lint

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: read

jobs:
  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            test
          requireScope: false
          subjectPattern: ^[a-z0-9].{2,}$
          subjectPatternError: The subject must start lowercase or with a number and be at least 3 characters.
          ignoreLabels: |
            dependencies

  lint-issue-title:
    name: Lint Issue Title
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - name: Check issue title
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = context.payload.issue.title || "";
            const valid = /^(Defect|Feature|Chore|Docs|Security|Epic):\s\S.{2,}$/;
            const placeholder = /^\[(BUG|FEATURE|CHORE|DOCS|SECURITY|EPIC)\]\s*$/i;
            if (!valid.test(title) || placeholder.test(title)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ["status: needs-info"],
              });
              core.setFailed("Issue titles must use 'Defect:', 'Feature:', 'Chore:', 'Docs:', 'Security:', or 'Epic:' followed by a specific subject.");
            }
