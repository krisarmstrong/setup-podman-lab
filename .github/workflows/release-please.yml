name: Release Please
on:
  push:
    branches: ["main"]
permissions:
  contents: write
  pull-requests: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062 # v5.0.0
        with:
          release-type: python
          package-name: setup-podman-lab
          extra-files: |
            VERSION
